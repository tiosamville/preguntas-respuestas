<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comunidad FAQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; color: white; padding: 50px; }
        .faq-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .faq-card:hover { background: rgba(255, 255, 255, 0.2); }
        .pregunta { font-size: 1.5rem; font-weight: bold; padding: 20px; }
        .respuesta { font-size: 1.1rem; padding: 0 20px 20px 20px; display: none; color: #d1d1d1; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-center mb-5">Preguntas Frecuentes de la Comunidad</h1>
    {% for p in preguntas %}
    <div class="faq-card" onclick="toggleRespuesta(this)">
        <div class="pregunta">#{{ loop.index }} - {{ p.pregunta }}</div>
        <div class="respuesta">{{ p.respuesta }}</div>
    </div>
    {% endfor %}
</div>
<div class="container mt-5">
    <div class="card p-4 mb-5" style="background: rgba(255,255,255,0.1); color: white;">
        <h3>¿Tienes alguna duda?</h3>
        <form action="/enviar" method="POST">
            <div class="mb-3">
                <input type="text" name="pregunta" class="form-control" placeholder="Escribe tu pregunta aquí..." required>
            </div>
            <button type="submit" class="btn btn-primary">Enviar Pregunta</button>
        </form>
    </div>
</div>
<script>
    function toggleRespuesta(elemento) {
        let respuesta = elemento.querySelector('.respuesta');
        respuesta.style.display = (respuesta.style.display === "block") ? "none" : "block";
    }
</script>
</body>
</html>
