<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sugerencia encontrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card p-5">
            <h2>¡Ya tenemos esa respuesta!</h2>
            <p>Parece que tu pregunta es muy similar a una que ya existe:</p>
            <h4 class="text-warning">{{ pregunta_existente }}</h4>
            <div class="alert alert-info mt-3" style="color: black;">
                <strong>Respuesta:</strong> {{ respuesta_existente }}
            </div>
            <a href="/" class="btn btn-light mt-3">Volver al inicio</a>
        </div>
    </div>
</body>
</html>
